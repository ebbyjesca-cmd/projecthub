<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans">
  <div class="flex h-screen">

    <!--sidebar-->
    <aside class="w64 bg-gray-900 text-gray-200 flex flex-col">
        <div class="p-6 text-xl font-bold border-b border-gray-700">ProjectHub</div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="block px-4 py-2 rounded hover:bg-gray-700">Dashboard</a>
            <a href="#" class="block px-4 py-2 rounded hover:bg-gray-700">Projects</a>
            <a href="#" class="block px-4 py-2 rounded hover:bg-gray-700">Tasks</a>
            <a href="#" class="block px-4 py-2 rounded hover:bg-gray-700">Teams</a>
            <a href="#" class="block px-4 py-2 rounded hover:bg-gray-700">Reports</a>
            <a href="#" class="block px-4 py-2 rounded hover:bg-gray-700">Settings</a>
        </nav>

        <div class="p-4 border-t border-gray-700">
            <button class="w-full bg-blue-600 py-2 rouded hover:bg-blue-700">Upgrade plan</button>
        </div>
    </aside>

    <div class="flex flex-col flex-1 overflow-hidden">
        <header class="bg-white shadow px-6 py-4 flex justofy-between items-center">
          <div class="flex items-center gap-4">
            <input type="text" placeholder="Search..." class="border rounded-lg px-4 py-2 w-72 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>  
          
          <div class="absolute top-1 right-1 gap-6">
            <div class="flex items-center gap-2 cursor-pointer">
                <img src="profile.jpg" class="rounded-full w-10 h-15">
                <span class="font-medium">Ebby</span>
            </div>
          </div>
        </header>
    </div>
  </div>  
</body>
</html>
